<script>
    //ENTRADA
let n1 = parseInt(prompt("Digite o valor do primeiro numero")); //parseInt foi colocado para que fosse feita a leitura correta do número
let n2 = parseInt(prompt("Digite o valor do segundo numero"));

    //PROCESSAMENTO
let soma = n1 + n2;
let sub = n1 - n2;
let mult = n1 * n2;
let potencia = n1 ** n2;
let div = n1 / n2


    //SAÍDA
document.write("A soma foi:" +soma+"<br/>");
document.write("A subtração foi:" +sub+"<br/>");
document.write("A Multiplicação foi:" +mult+"<br/>");
document.write("A potencia de " +n1+ "  elevado a:  "+n2+"="+potencia+"<br/>");
document.write("A divisão de " +n1+ "  por:  "+n2+"  =  "+div+"<br/>");

</script>
