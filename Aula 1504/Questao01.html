<script>
//01. Escreva um programa que pede o raio de um círculo, e em seguida exiba o perímetro e área do círculo.

//ENTRADA
let r = parseInt(prompt("Digite o valor do rio:"));
var pi= 3.14

/*FORMULA
area = pi * r ao quadrado
*/

/* ORDEM DE PRECEDÊNCIA
1º potência
2º  *  ou /   
3º  +  ou -
*/

//***********************************************************************
//PROCESSAMENTO
let area = pi*(r**2);

//***********************************************************************
//SAÍDA
document.write("O valor da area e:  " +area);


</script>
